<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<title>呼吸 · Breathe</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg-0:#15110e;
    --bg-1:#1c1813;
    --bg-2:#241e18;
    --fg-0:#f3ece0;
    --fg-1:#d9cfbe;
    --fg-2:#998c76;
    --fg-3:#5e5445;
    --clay:#c58560;
    --clay-soft:#e8ccb3;
    --clay-deep:#8a4a2a;
    --line: rgba(243,236,224,0.08);
    --line-2: rgba(243,236,224,0.14);
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased;}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--fg-0);font-family:'Inter',system-ui,sans-serif; overflow-x:hidden;}
  body{ min-height:100vh; font-size:15px; line-height:1.5; }
  .serif{font-family:'Instrument Serif', serif; font-weight:400;}
  .mono{font-family:'JetBrains Mono', monospace; font-weight:400;}

  /* ambient backdrop */
  .ambient{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(1200px 800px at 15% 10%, rgba(197,133,96,0.10), transparent 60%),
      radial-gradient(900px 700px at 85% 95%, rgba(197,133,96,0.07), transparent 55%),
      radial-gradient(600px 500px at 50% 50%, rgba(232,204,179,0.03), transparent 70%),
      var(--bg-0);
  }
  .grain{
    position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.5; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.7 0 0 0 0 0.6 0 0 0 0 0.5 0 0 0 0.35 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  }

  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
  a{color:inherit;}

  /* atoms */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border:1px solid var(--line-2);
    border-radius:999px; font-family:'JetBrains Mono', monospace;
    font-size:11px; color:var(--fg-1); letter-spacing:0.5px;
    background:rgba(243,236,224,0.02);
  }
  .chip .dot{ width:5px; height:5px; border-radius:50%; background:var(--clay); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 20px; border:1px solid var(--line-2); border-radius:999px;
    font-size:14px; color:var(--fg-0); background:transparent;
    transition: all 220ms ease;
  }
  .btn:hover{ border-color:var(--fg-1); background:rgba(243,236,224,0.04); }
  .btn.primary{ background:var(--clay); color:#1a0f06; border-color:var(--clay); font-weight:500; }
  .btn.primary:hover{ background:#d1926c; border-color:#d1926c; }
  .btn.ghost{ border-color:transparent; color:var(--fg-2); }
  .btn.ghost:hover{ color:var(--fg-0); background:rgba(243,236,224,0.04); }
  .btn .arr{ transition: transform 220ms ease; }
  .btn:hover .arr{ transform: translateX(3px); }

  .hair{ height:1px; background:var(--line); width:100%; }

  /* page */
  .app{ max-width:1360px; margin:0 auto; padding:28px 40px 80px; position:relative; min-height:100vh;}

  /* topnav */
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:22px; border-bottom:1px solid var(--line); margin-bottom:40px;
  }
  .nav-logo{
    display:flex; align-items:center; gap:12px; font-family:'Instrument Serif',serif;
    font-size:24px; letter-spacing:0.5px;
  }
  .nav-logo .glyph{
    width:26px; height:26px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, var(--clay-soft), var(--clay) 60%, var(--clay-deep));
    box-shadow: inset 0 0 8px rgba(0,0,0,0.25);
  }
  .nav-links{ display:flex; gap:4px; }
  .nav-links button{
    padding:8px 14px; border-radius:999px; font-size:14px; color:var(--fg-2);
  }
  .nav-links button.on{ color:var(--fg-0); background:rgba(243,236,224,0.06); }
  .nav-right{ display:flex; align-items:center; gap:16px; }

  /* view transitions */
  .view{ animation: fadeIn 500ms ease both; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ============ HOME ============ */
  .hero{ display:grid; grid-template-columns: 1.15fr 0.85fr; gap:60px; align-items:end; margin-bottom:56px;}
  .hero h1{ font-family:'Instrument Serif', serif; font-weight:400; font-size:104px; line-height:0.95; margin:0; letter-spacing:-1.5px;}
  .hero h1 em{ font-style:italic; color:var(--clay-soft); }
  .hero .lede{ color:var(--fg-1); font-size:17px; max-width:460px; margin-top:22px; line-height:1.55;}
  .hero .meta{ display:flex; gap:14px; margin-top:26px; flex-wrap:wrap;}

  .hero-side{ padding-bottom:14px;}
  .summary-card{
    border:1px solid var(--line-2); border-radius:16px; padding:22px;
    background: linear-gradient(180deg, rgba(243,236,224,0.03), transparent);
    backdrop-filter: blur(10px);
  }
  .summary-card .label{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--fg-2); text-transform:uppercase;}
  .summary-card h3{ font-family:'Instrument Serif',serif; font-size:30px; font-weight:400; margin:6px 0 14px; line-height:1.15;}
  .summary-card .nums{ display:flex; gap:24px; margin-top:14px;}
  .summary-card .nums div{ }
  .summary-card .nums .n{ font-family:'Instrument Serif',serif; font-size:38px; line-height:1;}
  .summary-card .nums .k{ color:var(--fg-2); font-size:11px; font-family:'JetBrains Mono',monospace; letter-spacing:0.5px;}
  .weekbars{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:18px; height:44px;}
  .weekbars .b{
    border-radius:3px; background: linear-gradient(180deg, var(--clay) var(--h,20%), rgba(243,236,224,0.05) var(--h,20%));
  }
  .weekbars .lbl{ font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--fg-3); text-align:center; margin-top:4px;}

  /* filter row */
  .filter-row{ display:flex; gap:8px; align-items:center; margin-bottom:20px; flex-wrap:wrap;}
  .filter-row .chip{ cursor:pointer; transition: all 180ms;}
  .filter-row .chip.on{ background:var(--fg-0); color:var(--bg-0); border-color:var(--fg-0);}
  .filter-row .chip:hover:not(.on){ border-color:var(--fg-1); color:var(--fg-0); }
  .filter-row .spacer{ flex:1; }

  /* technique cards */
  .tech-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
  .tech-card{
    position:relative; border:1px solid var(--line-2); border-radius:20px; padding:26px 24px;
    background: linear-gradient(180deg, rgba(243,236,224,0.035), rgba(243,236,224,0.01));
    overflow:hidden; cursor:pointer; transition: all 380ms cubic-bezier(0.2,0.8,0.2,1);
    min-height:280px; display:flex; flex-direction:column;
  }
  .tech-card::before{
    content:""; position:absolute; inset:0;
    background: radial-gradient(400px 200px at 100% 0%, rgba(197,133,96,0.12), transparent 60%);
    opacity:0; transition: opacity 380ms;
  }
  .tech-card:hover{ transform: translateY(-3px); border-color: rgba(197,133,96,0.4); }
  .tech-card:hover::before{ opacity:1; }
  .tech-card .pill{
    position:absolute; top:22px; right:22px;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px;
    padding:3px 8px; border-radius:999px; border:1px solid var(--line-2); color:var(--fg-2); text-transform:uppercase;
  }
  .tech-card h3{ font-family:'Instrument Serif', serif; font-weight:400; font-size:34px; margin:0 0 4px; line-height:1.05;}
  .tech-card .en{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2); letter-spacing:0.5px; margin-bottom:14px;}
  .tech-card p{ margin:0; color:var(--fg-1); font-size:14px; line-height:1.5; flex:1;}
  .tech-card .footer-line{
    display:flex; justify-content:space-between; align-items:center; margin-top:18px;
    padding-top:14px; border-top:1px solid var(--line);
  }
  .tech-card .rhythm{ display:flex; gap:3px; align-items:center;}
  .tech-card .rhythm .seg{
    height:4px; border-radius:2px; background:rgba(243,236,224,0.1);
  }
  .tech-card .rhythm .seg.inhale{ background:var(--clay-soft); }
  .tech-card .rhythm .seg.hold{ background: repeating-linear-gradient(90deg, var(--clay-soft) 0 2px, transparent 2px 4px);}
  .tech-card .rhythm .seg.exhale{ background:var(--clay); }
  .tech-card .dur{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2);}
  .tech-card .go{
    display:flex; align-items:center; gap:6px; font-size:13px; color:var(--fg-0); font-weight:500;
    transition: gap 220ms;
  }
  .tech-card:hover .go{ gap:10px; }
  .tech-card.featured{
    background: linear-gradient(160deg, rgba(197,133,96,0.12), rgba(197,133,96,0.02) 50%, transparent 80%);
    border-color: rgba(197,133,96,0.35);
  }

  /* ============ DETAIL ============ */
  .detail{ display:grid; grid-template-columns: 1fr 1fr; gap:56px; align-items:start; padding-top:12px;}
  .detail-left h1{ font-family:'Instrument Serif', serif; font-size:84px; font-weight:400; line-height:0.98; margin:8px 0 8px; letter-spacing:-1px;}
  .detail-left h1 em{ font-style:italic; color:var(--clay-soft);}
  .detail .kicker{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--clay); text-transform:uppercase;}
  .detail-left .lede{ font-size:17px; color:var(--fg-1); max-width:520px; margin-top:20px; line-height:1.6;}
  .detail-left .start-row{ display:flex; gap:12px; margin-top:32px; align-items:center;}

  .sci-grid{ display:grid; grid-template-columns:1fr; gap:1px; background:var(--line); margin-top:10px; border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .sci-row{ background:var(--bg-1); padding:18px 20px; display:grid; grid-template-columns: 170px 1fr; gap:20px; align-items:start;}
  .sci-row .k{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--clay); text-transform:uppercase; padding-top:2px;}
  .sci-row .v{ color:var(--fg-1); font-size:14.5px; line-height:1.55;}
  .sci-row .v b{ color:var(--fg-0); font-weight:500;}

  .rhythm-viz{ padding:28px 24px; border:1px solid var(--line-2); border-radius:20px;
    background: radial-gradient(600px 300px at 50% 0%, rgba(197,133,96,0.1), transparent 70%);
  }
  .rhythm-viz h4{ font-family:'Instrument Serif',serif; font-weight:400; font-size:22px; margin:0 0 12px;}
  .rhythm-viz .hint{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--fg-2); letter-spacing:1px; text-transform:uppercase; margin-top:14px;}

  /* ============ SESSION ============ */
  .session{
    position:fixed; inset:0; z-index:100;
    background: var(--bg-0);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    animation: sessFade 700ms ease;
  }
  @keyframes sessFade{ from{opacity:0;} to{opacity:1;}}
  .session .s-ambient{
    position:absolute; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(1200px 900px at 50% 55%, rgba(197,133,96,0.18), transparent 60%),
      radial-gradient(700px 500px at 20% 30%, rgba(232,204,179,0.06), transparent 60%),
      radial-gradient(700px 500px at 80% 70%, rgba(138,74,42,0.08), transparent 60%);
  }
  .session .s-top{
    position:absolute; top:28px; left:40px; right:40px; z-index:3;
    display:flex; justify-content:space-between; align-items:center;
  }
  .session .s-top .crumbs{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px; color:var(--fg-2); text-transform:uppercase;}
  .session .s-top .crumbs span{ color:var(--fg-0);}
  .session .s-bottom{
    position:absolute; bottom:36px; left:40px; right:40px; z-index:3;
    display:flex; justify-content:space-between; align-items:center;
  }
  .session .round-dots{ display:flex; gap:10px; align-items:center;}
  .session .round-dots .d{
    width:8px; height:8px; border-radius:50%; border:1px solid var(--fg-2);
    transition: all 400ms;
  }
  .session .round-dots .d.done{ background:var(--clay); border-color:var(--clay);}
  .session .round-dots .d.cur{ background:var(--fg-0); border-color:var(--fg-0); transform:scale(1.4);}
  .session .round-label{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2); letter-spacing:1px; margin-left:14px;}

  .orb-wrap{ position:relative; width:min(620px, 72vh); aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;}

  /* Breathing orb */
  .orb{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .orb .core{
    width:56%; height:56%;
    border-radius:50%;
    background:
      radial-gradient(circle at 38% 32%, rgba(243,236,224,0.55), rgba(232,204,179,0.25) 35%, rgba(197,133,96,0.65) 70%, rgba(138,74,42,0.85) 100%);
    box-shadow:
      0 0 80px 10px rgba(197,133,96,0.45),
      inset 0 0 60px rgba(255,220,190,0.2),
      inset -20px -30px 80px rgba(60,20,5,0.45);
    transition: transform 400ms cubic-bezier(0.4,0,0.2,1), box-shadow 400ms;
    will-change: transform;
    filter: blur(0.4px);
  }
  .orb .halo{
    position:absolute; border-radius:50%;
    border:1px solid rgba(243,236,224,0.08);
    transition: transform 400ms cubic-bezier(0.4,0,0.2,1), opacity 400ms, border-color 400ms;
    will-change: transform, opacity;
    pointer-events:none;
  }
  .orb .tick-ring{
    position:absolute; inset:0; pointer-events:none;
  }

  .orb-label{
    position:absolute; text-align:center; z-index:2;
    pointer-events:none;
  }
  .orb-label .phase{
    font-family:'Instrument Serif', serif; font-weight:400; font-style:italic;
    font-size:clamp(42px, 6vw, 64px); letter-spacing:-0.5px;
    line-height:1; color:var(--fg-0);
    transition: opacity 360ms;
  }
  .orb-label .count{
    font-family:'Instrument Serif', serif; font-size:clamp(80px, 14vw, 160px);
    line-height:0.9; margin-top:6px;
    color:var(--fg-0); letter-spacing:-3px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 40px rgba(0,0,0,0.3);
  }
  .orb-label .sub{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px;
    color:var(--fg-2); text-transform:uppercase; margin-top:10px;
  }

  /* Session controls */
  .s-controls{
    position:absolute; bottom:90px; left:50%; transform:translateX(-50%); z-index:3;
    display:flex; gap:12px; align-items:center;
  }
  .s-controls .iconbtn{
    width:44px; height:44px; border-radius:50%; border:1px solid var(--line-2);
    display:flex; align-items:center; justify-content:center;
    background: rgba(243,236,224,0.03); color:var(--fg-1);
    transition: all 200ms;
  }
  .s-controls .iconbtn:hover{ background:rgba(243,236,224,0.08); border-color:var(--fg-2); color:var(--fg-0);}
  .s-controls .iconbtn.big{ width:60px; height:60px; background:var(--clay); color:#1a0f06; border-color:var(--clay);}
  .s-controls .iconbtn.big:hover{ background:#d1926c;}

  /* Countdown intro */
  .countdown{
    position:fixed; inset:0; z-index:120;
    background: var(--bg-0);
    display:flex; align-items:center; justify-content:center;
  }
  .countdown .num{
    font-family:'Instrument Serif', serif; font-size:220px; line-height:1;
    color:var(--fg-0); animation: cdPulse 1s ease;
  }
  @keyframes cdPulse{
    0%{opacity:0; transform:scale(0.8);}
    30%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.1);}
  }

  /* Completion */
  .complete{ max-width:720px; margin:0 auto; text-align:center; padding-top:40px;}
  .complete h1{ font-family:'Instrument Serif', serif; font-weight:400; font-style:italic; font-size:96px; line-height:1; margin:0 0 16px; letter-spacing:-1.5px;}
  .complete h1 em{color:var(--clay-soft);}
  .complete .lede{ color:var(--fg-1); font-size:17px; margin-bottom:36px;}
  .complete .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:32px;}
  .complete .stat{ background:var(--bg-1); padding:28px 14px;}
  .complete .stat .n{ font-family:'Instrument Serif',serif; font-size:48px; line-height:1; color:var(--clay-soft);}
  .complete .stat .k{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--fg-2); text-transform:uppercase; margin-top:8px;}
  .complete .mood{ margin-top:8px;}
  .complete .mood .title{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--fg-2); text-transform:uppercase; margin-bottom:14px;}
  .complete .mood .row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .complete .mood button{
    padding:12px 24px; border:1px solid var(--line-2); border-radius:999px; color:var(--fg-1);
    transition: all 200ms;
  }
  .complete .mood button:hover{ border-color:var(--clay); color:var(--fg-0);}
  .complete .mood button.on{ background:var(--clay); color:#1a0f06; border-color:var(--clay);}
  .complete .cta{ display:flex; gap:12px; justify-content:center; margin-top:40px;}

  /* History */
  .history h1{ font-family:'Instrument Serif',serif; font-weight:400; font-size:72px; margin:0 0 8px; letter-spacing:-1px;}
  .history .sub{ color:var(--fg-2); margin-bottom:40px; font-size:15px;}
  .history-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:40px;}
  .heatmap{ border:1px solid var(--line-2); border-radius:16px; padding:22px;}
  .heatmap h3{ font-family:'Instrument Serif',serif; font-size:22px; margin:0 0 6px; font-weight:400;}
  .heatmap .grid{ display:grid; grid-template-columns:repeat(10,1fr); gap:6px; margin-top:16px;}
  .heatmap .cell{ aspect-ratio:1/1; border-radius:4px; border:1px solid var(--line);}
  .heatmap .legend{ display:flex; align-items:center; gap:10px; margin-top:16px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--fg-2); letter-spacing:1px;}
  .heatmap .legend .scale{ display:flex; gap:3px;}
  .heatmap .legend .scale div{ width:12px; height:12px; border-radius:3px; border:1px solid var(--line);}
  .stats-panel{ display:flex; flex-direction:column; gap:14px; }
  .stats-panel .row{ display:grid; grid-template-columns:1fr auto; gap:20px; align-items:baseline; padding:18px 22px; border:1px solid var(--line-2); border-radius:14px; }
  .stats-panel .row .k{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--fg-2); text-transform:uppercase;}
  .stats-panel .row .v{ font-family:'Instrument Serif',serif; font-size:40px; line-height:1;}
  .stats-panel .row .v small{ font-family:'Instrument Serif',serif; font-size:18px; color:var(--fg-2); margin-left:4px;}

  .session-log{ display:flex; flex-direction:column; gap:1px; margin-top:32px; border:1px solid var(--line); border-radius:16px; overflow:hidden; background:var(--line);}
  .session-log .row{ display:grid; grid-template-columns: 80px 1fr 100px 70px; gap:16px; padding:14px 18px; background:var(--bg-1); font-size:14px; align-items:center;}
  .session-log .row .d{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg-2); letter-spacing:1px;}
  .session-log .row .t{ color:var(--fg-0);}
  .session-log .row .n{ color:var(--fg-1); font-family:'JetBrains Mono',monospace; font-size:12px;}
  .session-log .row .m{ color:var(--clay); font-size:13px; text-align:right;}

  /* Tweaks panel */
  #tweaks{
    position:fixed; right:24px; bottom:24px; width:280px; z-index:200;
    background:var(--bg-1); border:1px solid var(--line-2); border-radius:16px;
    padding:18px; display:none;
    box-shadow: 0 16px 60px rgba(0,0,0,0.4);
  }

/* =============== Audio =============== */
let audioCtx = null;
function playTone(freq=440, dur=0.4, vol=0.06, type="sine"){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime+0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur+0.05);
  }catch(e){}
}

function RhythmWave({ phases }){
  const total = phases.reduce((a,p)=>a+p[1],0);
  const W = 520, H = 140, BASE = 110, PEAK = 20, HOLD = 55;
  let x = 10;
  const pts = [[10, BASE]];
  phases.forEach(([n,s,kind])=>{
    const w = (500 * s)/total;
    const targetY = kind==="inhale" ? PEAK : kind==="exhale" ? BASE : pts[pts.length-1][1];
    // if hold at top
    if(kind==="hold" && pts[pts.length-1][1] < (PEAK+BASE)/2) {
      pts.push([x+w, PEAK]);
    } else if(kind==="hold"){
      pts.push([x+w, BASE]);
    } else {
      pts.push([x+w, targetY]);
    }
    x += w;
  });
  const d = pts.reduce((acc,[x,y],i)=>{
    if(i===0) return `M ${x} ${y}`;
    const [px,py] = pts[i-1];
    const cx1 = px + (x-px)/2;
    const cx2 = px + (x-px)/2;
    return acc + ` C ${cx1} ${py}, ${cx2} ${y}, ${x} ${y}`;
  },"");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height:140}}>
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--clay)" stopOpacity="0.55"/>
          <stop offset="100%" stopColor="var(--clay)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${d} L ${W-10} ${BASE+20} L 10 ${BASE+20} Z`} fill="url(#wg)"/>
      <path d={d} fill="none" stroke="var(--clay-soft)" strokeWidth="2"/>
      {/* tick labels */}
      {(() => {
        let cx = 10;
        return phases.map(([n,s,kind],i)=>{
          const w = (500 * s)/total;
          const el = (
            <g key={i}>
              <line x1={cx} x2={cx} y1={BASE+18} y2={BASE+24} stroke="var(--line-2)"/>
              <text x={cx+w/2} y={BASE+38} textAnchor="middle" style={{font:"10px JetBrains Mono", fill:"var(--fg-2)", letterSpacing:1}}>{n} · {s}s</text>
            </g>
          );
          cx += w;
          return el;
        });
      })()}
    </svg>
  );
}

  ];
  const edges = [
    [0,1], [1,2], [2,3], [2,4]
  ];
  return (
    <svg viewBox="0 0 520 160" style={{width:"100%", height:150}}>
      <defs>
        <marker id="np-arr" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--clay)"/>
        </marker>
      </defs>
      {edges.map(([a,b],i)=>{
        const [,ax,ay] = nodes[a], [,bx,by] = nodes[b];
        return <path key={i} d={`M ${ax+50} ${ay} Q ${(ax+bx)/2} ${(ay+by)/2} ${bx-50} ${by}`}
          fill="none" stroke="var(--clay)" strokeOpacity="0.6" strokeWidth="1.3"
          strokeDasharray={b===4?"3,3":null}
          markerEnd="url(#np-arr)"/>;
      })}
      {nodes.map(([n,x,y,kind],i)=>(
        <g key={i}>
          <rect x={x-50} y={y-16} width="100" height="32" rx="16"
            fill={kind==="cortex"?"rgba(197,133,96,0.15)":"rgba(243,236,224,0.04)"}
            stroke={kind==="cortex"?"var(--clay-soft)":"var(--line-2)"}
            strokeWidth="1"/>
          <text x={x} y={y+4} textAnchor="middle" style={{font:"12px Inter", fill:"var(--fg-0)"}}>{n}</text>
        </g>
      ))}
    </svg>
  );
}

/* =============== SESSION =============== */
function Session({ techId, rounds, sound, onFinish, onExit, tweaks }){
  const t = TECHNIQUES.find(x=>x.id===techId);
  const [intro, setIntro] = useState(3);
  const [paused, setPaused] = useState(false);
  const [round, setRound] = useState(0);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [remaining, setRemaining] = useState(t.phases[0][1]);
  const [phaseStart, setPhaseStart] = useState(0);
  const tickRef = useRef();
  const startedAt = useRef(Date.now());

  // intro countdown
  useEffect(()=>{
    if(intro<=0) return;
    const id = setTimeout(()=>{
      if(intro===1 && sound) playTone(660, 0.5, 0.08);
      else if(sound) playTone(440, 0.25, 0.04);
      setIntro(v=>v-1);
    }, 900);
    return ()=>clearTimeout(id);
  },[intro, sound]);

  // active loop — 10Hz tick for smooth visuals, integer countdown for display
  useEffect(()=>{
    if(intro>0 || paused) return;
    const startTime = Date.now();
    setPhaseStart(startTime);
    // sound on phase enter
    if(sound){
      const [,,kind] = t.phases[phaseIdx];
      if(kind==="inhale") playTone(523, 0.35, 0.05);
      else if(kind==="exhale") playTone(392, 0.5, 0.05);
      else playTone(440, 0.2, 0.03);
    }
    tickRef.current = setInterval(()=>{
      const elapsed = (Date.now()-startTime)/1000;
      const phaseSec = t.phases[phaseIdx][1];
      const left = Math.max(0, phaseSec - elapsed);
      setRemaining(left);
      if(elapsed >= phaseSec){
        clearInterval(tickRef.current);
        // advance
        if(phaseIdx < t.phases.length-1){
          setPhaseIdx(phaseIdx+1);
          setRemaining(t.phases[phaseIdx+1][1]);
        } else {
          // round complete
          if(round < rounds-1){
            setRound(round+1); setPhaseIdx(0);
            setRemaining(t.phases[0][1]);
          } else {
            // finished
            clearInterval(tickRef.current);
            const totalSec = Math.round((Date.now()-startedAt.current)/1000);
            onFinish({ techId, rounds, seconds: totalSec, date: new Date().toISOString() });
          }
        }
      }
    }, 100);
    return ()=> clearInterval(tickRef.current);
  },[intro, phaseIdx, round, paused]);

  if(intro>0){
    return (
      <div className="countdown">
        <div className="num" key={intro}>{intro}</div>
      </div>
    );
  }

  const [phaseName,phaseSec,kind] = t.phases[phaseIdx];
  const progress = 1 - remaining/phaseSec;
  // Scale model
  const scaleFor = (kind,progress)=>{
    if(kind==="inhale") return 0.45 + 0.55*eased(progress);
    if(kind==="exhale") return 1.0  - 0.55*eased(progress);
    return kind==="hold" ? (phaseIdx>0 && t.phases[phaseIdx-1][2]==="inhale" ? 1.0 : 0.45) : 0.72;
  };
  function eased(p){ return 0.5 - Math.cos(Math.PI*p)/2; }
  const scale = scaleFor(kind, progress);
  const orbScale = 0.55 + scale*0.45; // 0.55 -> 1.0
  const orbGlow = 0.6 + scale*0.5;

  return (
    <div className="session">
      <div className="s-ambient" style={{transform:`scale(${0.98 + scale*0.04})`, transition:"transform 400ms"}}/>

      <div className="s-top">
        <div className="crumbs">{t.name} · <span>{t.en}</span></div>
        <button className="btn ghost" onClick={onExit}>退出 ×</button>
      </div>

      <div className="orb-wrap">
        {/* concentric halos */}
        {[1.3, 1.55, 1.85].map((m,i)=>(
          <div key={i} className="halo" style={{
            width:`${56*m}%`, height:`${56*m}%`,
            transform:`scale(${orbScale})`,
            opacity: 0.8 - i*0.22,
            borderColor: i===0 ? "rgba(232,204,179,0.25)" : "rgba(243,236,224,0.07)",
          }}/>
        ))}

        {/* tick ring (rounds) */}
        <svg className="tick-ring" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(243,236,224,0.06)" strokeWidth="0.5"/>
          {/* progress arc — overall rounds progress */}
          {(() => {
            const totalOne = t.phases.reduce((a,p)=>a+p[1],0);
            const elapsedInRound = t.phases.slice(0,phaseIdx).reduce((a,p)=>a+p[1],0) + (phaseSec-remaining);
            const totalProg = (round + elapsedInRound/totalOne)/rounds;
            const C = 2*Math.PI*96;
            return <circle cx="100" cy="100" r="96" fill="none"
              stroke="var(--clay-soft)" strokeWidth="0.8" strokeLinecap="round"
              strokeDasharray={`${C*totalProg} ${C}`}
              transform="rotate(-90 100 100)" opacity="0.9"/>;
          })()}
          {/* phase markers: one dot per round on the ring */}
          {[...Array(rounds)].map((_,i)=>{
            const ang = -Math.PI/2 + (i/rounds)*Math.PI*2;
            const cx = 100 + Math.cos(ang)*96, cy = 100 + Math.sin(ang)*96;
            return <circle key={i} cx={cx} cy={cy} r={i<=round?2:1.3}
              fill={i<round?"var(--clay)":i===round?"var(--fg-0)":"var(--fg-3)"}/>;
          })}
        </svg>

        {/* core orb */}
        <div className="orb">
          <div className="core" style={{
            transform:`scale(${orbScale})`,
            boxShadow:`0 0 ${60+orbGlow*80}px ${10+orbGlow*10}px rgba(197,133,96,${0.35+orbGlow*0.2}), inset 0 0 60px rgba(255,220,190,0.2), inset -20px -30px 80px rgba(60,20,5,0.45)`,
          }}/>
        </div>

        {/* center label */}
        <div className="orb-label">
          <div className="phase" key={phaseIdx+"-"+round}>{phaseName}</div>
          <div className="count">{Math.ceil(remaining)}</div>
          <div className="sub">{t.en} · R{round+1}/{rounds}</div>
        </div>
      </div>

      <div className="s-controls">
        <button className="iconbtn" title="重来" onClick={()=>{setRound(0); setPhaseIdx(0); setRemaining(t.phases[0][1]); startedAt.current = Date.now();}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/>
          </svg>
        </button>
        <button className="iconbtn big" title={paused?"继续":"暂停"} onClick={()=>setPaused(p=>!p)}>
          {paused ? (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4v16l13-8z"/></svg>
          ) : (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          )}
        </button>
        <button className="iconbtn" title="跳过此轮" onClick={()=>{
          if(round < rounds-1){ setRound(round+1); setPhaseIdx(0); setRemaining(t.phases[0][1]); }
          else { const totalSec = Math.round((Date.now()-startedAt.current)/1000); onFinish({techId,rounds,seconds:totalSec,date:new Date().toISOString()}); }
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l10 8-10 8V4zm12 0h2v16h-2z"/></svg>
        </button>
      </div>

      <div className="s-bottom">
        <div style={{display:"flex", alignItems:"center"}}>
          <div className="round-dots">
            {[...Array(rounds)].map((_,i)=>(
              <div key={i} className={`d ${i<round?"done":i===round?"cur":""}`}/>
            ))}
          </div>
          <span className="round-label">ROUND {round+1} / {rounds}</span>
        </div>
        <div style={{fontFamily:"JetBrains Mono,monospace", fontSize:11, color:"var(--fg-2)", letterSpacing:1.5}}>
          {sound ? "♪ AMBIENT TONES ON" : "SILENT MODE"}
        </div>
      </div>
    </div>
  );
}

/* =============== COMPLETION =============== */

  const [mood, setMood] = useState(null);

  return (
    <div className="view complete">

      <div className="stats">
        <div className="stat"><div className="n">{last.rounds}</div><div className="k">轮数</div></div>

/* =============== HISTORY =============== */
function History({ history }){
  const days = 30;
  const byDay = {};
  history.forEach(h=>{
    const d = new Date(h.date).toISOString().slice(0,10);
    byDay[d] = (byDay[d]||0) + h.seconds;
  });
  const cells = [];
  for(let i=days-1;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    cells.push({ key, sec: byDay[key]||0, date: d });
  }
  const totalSec = history.reduce((a,h)=>a+h.seconds,0);
  const totalMin = Math.round(totalSec/60);
  const totalH = Math.floor(totalMin/60);
  const totalM = totalMin%60;
  const counts = {};
  history.forEach(h=>{ counts[h.techId]=(counts[h.techId]||0)+1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const topName = top ? TECHNIQUES.find(t=>t.id===top[0])?.name : "—";
  const streak = computeStreak(history);
  const maxSec = Math.max(120, ...cells.map(c=>c.sec));

  return (
    <div className="view history">
      <h1>练习历史</h1>
      <div className="sub">每一次呼吸，都在训练你的迷走神经。</div>
      <div className="history-grid">
        <div className="heatmap">
          <h3>近 30 天</h3>
          <div style={{color:"var(--fg-2)", fontSize:13}}>颜色越深，当天练习越久</div>
          <div className="grid">
            {cells.map(c=>{
              const opacity = c.sec===0 ? 0 : 0.2 + 0.8 * Math.min(1, c.sec/maxSec);
              return <div key={c.key} className="cell" title={`${c.key}: ${Math.round(c.sec/60)}min`}
                style={{background:`rgba(197,133,96,${opacity})`, borderColor: c.sec>0?"rgba(197,133,96,0.2)":"var(--line)"}}/>;
            })}
          </div>
          <div className="legend">
            <span>少</span>
            <div className="scale">
              {[0, 0.2, 0.4, 0.6, 0.85].map(v=>
                <div key={v} style={{background:`rgba(197,133,96,${v})`, borderColor: v>0?"rgba(197,133,96,0.2)":"var(--line)"}}/>
              )}
            </div>
            <span>多</span>
          </div>
        </div>

        <div className="stats-panel">
          <div className="row">
            <div className="k">总时长</div>
            <div className="v">{totalH}<small>h</small>{totalM}<small>m</small></div>
          </div>
          <div className="row">
            <div className="k">最常用</div>
            <div className="v">{topName}</div>
          </div>
          <div className="row">
            <div className="k">连击</div>
            <div className="v">{streak}<small>天</small></div>
          </div>
          <div className="row">
            <div className="k">总会话</div>
            <div className="v">{history.length}</div>
          </div>
        </div>
      </div>

      <div style={{marginTop:48}}>
        <h3 className="serif" style={{fontSize:28, fontWeight:400, margin:"0 0 14px"}}>最近会话</h3>
        <div className="session-log">
          {history.length===0 && (
            <div className="row" style={{gridTemplateColumns:"1fr", color:"var(--fg-2)"}}>还没有练习记录。开始第一次，然后回来看看。</div>
          )}
          {[...history].reverse().slice(0,12).map((h,i)=>{
            const t = TECHNIQUES.find(x=>x.id===h.techId);
            const d = new Date(h.date);
            return (
              <div key={i} className="row">
                <div className="d">{d.getMonth()+1}/{d.getDate()} {String(d.getHours()).padStart(2,"0")}:{String(d.getMinutes()).padStart(2,"0")}</div>
                <div className="t">{t?.name || h.techId}</div>
                <div className="n">{h.rounds} 轮 · {Math.round(h.seconds)}s</div>
                <div className="m">{h.mood || "—"}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function computeStreak(history){
  if(!history.length) return 0;
  const days = new Set(history.map(h=> new Date(h.date).toISOString().slice(0,10)));
  let streak = 0;
  for(let i=0;i<365;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const k = d.toISOString().slice(0,10);
    if(days.has(k)) streak++;
    else if(i>0) break;
  }
  return streak;
}
function computeWeek(history){
  const week = [0,0,0,0,0,0,0];
  const now = new Date();
  history.forEach(h=>{
    const d = new Date(h.date);
    const diff = Math.floor((now - d)/(1000*60*60*24));
    if(diff < 7){
      const dow = (d.getDay()+6)%7; // Monday=0
      week[dow] += h.seconds;
    }
  });
  const max = Math.max(600, ...week);
  return week.map(s=> s/max );
}

/* =============== Seed data (for demo) =============== */
function seedHistory(){
  const existing = loadState().history;
  if(existing && existing.length) return existing;
  const out = [];
  const now = Date.now();
  const techIds = ["478","box","res","46","nadi"];
  for(let i=0;i<22;i++){
    const daysAgo = Math.floor(Math.random()*28);
    const d = new Date(now - daysAgo*86400000 - Math.random()*43200000);
    out.push({
      techId: techIds[Math.floor(Math.random()*techIds.length)],
      rounds: 4 + Math.floor(Math.random()*4),
      seconds: 60 + Math.floor(Math.random()*240),
      date: d.toISOString(),
      mood: ["更放松","更专注","平静",null][Math.floor(Math.random()*4)],
    });
  }
  return out;
}

/* =============== APP =============== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "clay",
  "rounds": 4,
  "sound": true,
  "mode": "orb"
}/*EDITMODE-END*/;

function applyAccent(id){
  const a = ACCENTS[id] || ACCENTS.clay;
  const r = document.documentElement.style;
  r.setProperty("--clay", a.deep);
  r.setProperty("--clay-soft", a.soft);
  r.setProperty("--clay-deep", a.dark);
  r.setProperty("--bg-0", a.bg0);
  r.setProperty("--bg-1", a.bg1);
  r.setProperty("--bg-2", a.bg2);
}

function App(){
  const saved = loadState();
  const [view, setView] = useState(saved.view || "home");
  const [techId, setTechId] = useState(saved.techId || "478");
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS, ...(saved.tweaks||{}) });
  const [session, setSession] = useState(null); // {techId, rounds}
  const [lastResult, setLastResult] = useState(null);
  const [history, setHistory] = useState(saved.history || seedHistory());

  useEffect(()=>{ applyAccent(tweaks.accent); },[tweaks.accent]);
  useEffect(()=>{ saveState({view, techId, tweaks, history}); },[view, techId, tweaks, history]);

  const startSession = (id)=>{
    setTechId(id);
    setSession({ techId: id, rounds: tweaks.rounds });
  };
  const finishSession = (result)=>{
    setHistory([...history, result]);
    setLastResult(result);
    setSession(null);
    setView("complete");
  };
  const exitSession = ()=>{ setSession(null); };
  const repeatSession = (id)=>{ setView("home"); setTimeout(()=>{ setSession({techId:id, rounds: tweaks.rounds}); }, 10); };

  // expose tweak controls
  useEffect(()=>{
    window.__setTweak = (k,v)=> setTweaks(t=>({...t, [k]:v}));
    window.__tweakState = tweaks;
  },[tweaks]);

  return (
    <div className="app">
      {!session && view!=="complete" && <Nav view={view} setView={setView} tweaks={tweaks}/>}
      {view==="home" && !session && (
        <Home setView={setView} setTechId={setTechId} tweaks={tweaks} history={history}/>
      )}
      {view==="detail" && !session && (
        <Detail techId={techId} setView={setView} startSession={startSession}/>
      )}
      {view==="history" && !session && (
        <History history={history}/>
      )}
      {view==="complete" && !session && lastResult && (
        <Completion last={lastResult} setView={setView} repeat={repeatSession}/>
      )}
      {session && (
        <Session techId={session.techId} rounds={session.rounds} sound={tweaks.sound}
          onFinish={finishSession} onExit={exitSession} tweaks={tweaks}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

/* =============== Tweaks wiring =============== */
function buildTweaks(){
  const accentRow = document.getElementById("tw-accent");
  const soundRow = document.getElementById("tw-sound");
  const modeRow = document.getElementById("tw-mode");
  const rounds = document.getElementById("tw-rounds");
  const roundsVal = document.getElementById("tw-rounds-val");

  function render(){
    const tw = window.__tweakState;
    if(!tw) { requestAnimationFrame(render); return; }

    accentRow.innerHTML = "";
    Object.entries(ACCENTS).forEach(([id,a])=>{
      const b = document.createElement("button");
      b.className = "sw" + (tw.accent===id?" on":"");
      b.style.background = `radial-gradient(circle at 35% 35%, ${a.soft}, ${a.deep} 60%, ${a.dark})`;
      b.title = a.name;
      b.onclick = ()=>set("accent", id);
      accentRow.appendChild(b);
    });
    soundRow.innerHTML = "";
    [["on",true],["off",false]].forEach(([label,v])=>{
      const b = document.createElement("button");
      b.className = "pill" + (tw.sound===v?" on":"");
      b.textContent = label==="on"?"开":"关";
      b.onclick = ()=>set("sound", v);
      soundRow.appendChild(b);
    });
    modeRow.innerHTML = "";
    [["orb","圆球"],["ring","圆环"]].forEach(([id,label])=>{
      const b = document.createElement("button");
      b.className = "pill" + (tw.mode===id?" on":"");
      b.textContent = label;
      b.onclick = ()=>set("mode", id);
      modeRow.appendChild(b);
    });

    rounds.value = tw.rounds;
    roundsVal.textContent = tw.rounds + " 轮";
    rounds.oninput = e=> set("rounds", +e.target.value);
  }
  function set(k,v){
    window.__setTweak(k,v);
    // persist to disk
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:{[k]:v}}, "*");
    setTimeout(render, 30);
  }
  render();
  // re-render occasionally to reflect external state changes
  setInterval(render, 600);
}
buildTweaks();

/* Edit mode protocol */
window.addEventListener("message", e=>{
  if(!e.data) return;
  if(e.data.type==="__activate_edit_mode"){
    document.getElementById("tweaks").style.display = "block";
  } else if(e.data.type==="__deactivate_edit_mode"){
    document.getElementById("tweaks").style.display = "none";
  }
});
window.parent.postMessage({type:"__edit_mode_available"}, "*");
